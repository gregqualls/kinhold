name: Bug Report
description: Report something that isn't working correctly
title: "Bug: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we trigger this bug?
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error ...

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Production (kinhold.app)
        - Local development
        - Docker
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, error logs, browser info, etc.

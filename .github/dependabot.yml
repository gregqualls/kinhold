# Dependabot config — keeps dependencies current and patched.
# Docs: https://docs.github.com/code-security/dependabot
version: 2
updates:
  # PHP / Laravel
  - package-ecosystem: composer
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      php-minor-and-patch:
        update-types: ["minor", "patch"]

  # Frontend
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      js-minor-and-patch:
        update-types: ["minor", "patch"]

  # GitHub Actions used in workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday

  # Dockerfile base image
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday

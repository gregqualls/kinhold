# Kinhold — Simple Self-Hosted Setup
#
# Runs Kinhold with a single container using SQLite.
# No PostgreSQL, Redis, or external services required.
#
# Quick start:
#   cp .env.docker-simple .env
#   docker compose -f docker-compose.simple.yml up -d
#   docker compose -f docker-compose.simple.yml exec app php artisan db:seed
#   Open http://localhost:8000
#
# Or use the setup script: ./setup-simple.sh
#
# For home servers (Unraid, Portainer, TrueNAS, CasaOS, etc.) without
# a local copy of the source, use docker-compose.homeserver.yml instead.

name: kinhold

services:
  app:
    image: gregqualls/kinhold:latest
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - kinhold-data:/data
      - kinhold-storage:/app/storage/app
    command: ["php", "artisan", "serve", "--host=0.0.0.0", "--port=8000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  kinhold-data:
    driver: local
  kinhold-storage:
    driver: local

applications:
  app:
    type: php:8.4
    runtime:
      extensions:
        - redis
    build:
      flavor: composer
    relationships:
      database: "db:postgresql"
      redis: "cache:redis"
    mounts:
      "/storage":
        source: storage
        source_path: storage
      "/bootstrap/cache":
        source: storage
        source_path: bootstrap/cache
    web:
      locations:
        "/":
          root: public
          index:
            - index.php
          passthru: /index.php
          rules:
            "^/\\.(?!well-known|git)":
              allow: false
            "^/(?:build|storage|bootstrap/cache)/":
              allow: true
              expires: 60d
            "^(?:favicon\\.ico|robots\\.txt)$":
              allow: true
              expires: 1d
    workers:
      queue:
        commands:
          start: php artisan queue:work
      scheduler:
        commands:
          start: php artisan schedule:work
    hooks:
      build: |
        set -e
        composer install --no-dev --prefer-dist --optimize-autoloader
        npm ci
        npm run build
      deploy: |
        set -e
        php artisan migrate --force
        php artisan storage:link
        php artisan config:cache
        php artisan route:cache
        php artisan view:cache

services:
  db:
    type: postgresql:16
  cache:
    type: redis:7.2

routes:
  "https://{default}/":
    type: upstream
    upstream: app:http
    cache:
      enabled: true
      headers: ["Accept", "Accept-Language", "Content-Language"]
      default_ttl: 300

[PHP]
; Production PHP configuration for Kinhold

; File uploads
upload_max_filesize = 50M
post_max_size = 50M
file_uploads = On
max_file_uploads = 20

; Memory and execution
memory_limit = 256M
max_execution_time = 60
max_input_time = 60
default_socket_timeout = 60

; Database
default_charset = "UTF-8"

; Session
session.save_handler = files
session.gc_maxlifetime = 86400
session.cookie_secure = 0
session.cookie_httponly = 1
session.cookie_samesite = Lax

; Error handling
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /var/log/php-errors.log

; Extensions
extension = redis.so
extension = gd.so
extension = zip.so
extension = bcmath.so
extension = intl.so
extension = pdo_pgsql.so
extension = pdo_sqlite.so

; Disable dangerous functions
disable_functions = passthru,shell_exec,system,popen,pcntl_exec,socket_create,socket_create_listen

; Date/Time
date.timezone = UTC

; CLI specific
[CLI]
memory_limit = -1
